services:
  postgres:
    image: postgres:16-alpine
    container_name: etsysentry-postgres
    restart: unless-stopped
    ports:
      - '127.0.0.1:5435:5432'
    environment:
      POSTGRES_DB: ${ETSYSENTRY_DATABASE_NAME:-etsysentry}
      POSTGRES_USER: ${ETSYSENTRY_DATABASE_USER:-etsysentry}
      POSTGRES_PASSWORD: ${ETSYSENTRY_DATABASE_PASSWORD:-etsysentry_local_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - etsysentry
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${ETSYSENTRY_DATABASE_USER:-etsysentry} -d ${ETSYSENTRY_DATABASE_NAME:-etsysentry}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  website:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: etsysentry-website:local
    container_name: etsysentry-website
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${ETSYSENTRY_DATABASE_USER:-etsysentry}:${ETSYSENTRY_DATABASE_PASSWORD:-etsysentry_local_dev_password}@postgres:5432/${ETSYSENTRY_DATABASE_NAME:-etsysentry}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etsysentry
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  server:
    image: etsysentry-website:local
    container_name: etsysentry-server
    restart: unless-stopped
    command: ['bun', 'run', '--cwd', 'apps/server', 'start']
    environment:
      PORT: 8080
      NODE_ENV: production
      APP_ORIGIN: ${APP_ORIGIN:-https://etsysentry.merchbase.co}
      ETSY_API_KEY: ${ETSY_API_KEY}
      ETSY_OAUTH_REDIRECT_URI: ${ETSY_OAUTH_REDIRECT_URI}
      ETSY_OAUTH_SCOPES: '${ETSY_OAUTH_SCOPES:-listings_r listings_w shops_r transactions_r}'
      ETSY_OAUTH_STATE_TTL_MS: ${ETSY_OAUTH_STATE_TTL_MS:-600000}
      ETSY_OAUTH_REFRESH_SKEW_MS: ${ETSY_OAUTH_REFRESH_SKEW_MS:-120000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etsysentry
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://127.0.0.1:8080/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:alpine
    container_name: etsysentry-caddy
    restart: unless-stopped
    ports:
      - '127.0.0.1:8093:80'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      website:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - etsysentry
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  etsysentry:
    driver: bridge
