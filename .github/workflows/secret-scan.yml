name: Secret Scan

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    gitleaks:
        name: Gitleaks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect secrets
              run: |
                  if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                    LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
                  else
                    LOG_OPTS="${{ github.event.before }}..${{ github.sha }}"
                  fi

                  if [[ "$LOG_OPTS" == "0000000000000000000000000000000000000000.."* ]]; then
                    LOG_OPTS="${{ github.sha }}"
                  fi

                  echo "Scanning commits: $LOG_OPTS"

                  docker run --rm \
                    -v "$PWD":/repo \
                    zricethezav/gitleaks:v8.30.0 \
                    detect \
                    --source=/repo \
                    --log-opts="$LOG_OPTS" \
                    --redact \
                    --no-banner
